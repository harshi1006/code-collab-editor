<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}CodeSync{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
  <style>
    :root {
      --bg:       #0a0c10;
      --surface:  #111318;
      --border:   #1e2230;
      --accent:   #00e5ff;
      --accent2:  #7c3aed;
      --accent3:  #10b981;
      --danger:   #ef4444;
      --text:     #e2e8f0;
      --muted:    #64748b;
      --glow:     0 0 20px rgba(0,229,255,.25);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; }
    code, pre, .mono { font-family: 'JetBrains Mono', monospace; }

    /* Navbar */
    .navbar-custom {
      background: rgba(10,12,16,.9);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: .75rem 1.5rem;
    }
    .brand-logo {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      font-size: 1.3rem;
      color: var(--accent) !important;
      text-decoration: none;
      letter-spacing: -1px;
    }
    .brand-logo span { color: var(--accent2); }

    .btn-glow {
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: 'JetBrains Mono', monospace;
      font-size: .8rem;
      padding: .4rem 1rem;
      border-radius: 4px;
      transition: all .2s;
      text-decoration: none;
      display: inline-block;
    }
    .btn-glow:hover {
      background: var(--accent);
      color: var(--bg);
      box-shadow: var(--glow);
    }
    .btn-solid {
      background: var(--accent);
      border: 1px solid var(--accent);
      color: var(--bg);
      font-family: 'JetBrains Mono', monospace;
      font-size: .8rem;
      font-weight: 600;
      padding: .4rem 1rem;
      border-radius: 4px;
      transition: all .2s;
      text-decoration: none;
      display: inline-block;
    }
    .btn-solid:hover {
      background: transparent;
      color: var(--accent);
      box-shadow: var(--glow);
    }
    .btn-purple {
      background: var(--accent2);
      border: 1px solid var(--accent2);
      color: #fff;
      font-family: 'JetBrains Mono', monospace;
      font-size: .8rem;
      font-weight: 600;
      padding: .4rem 1rem;
      border-radius: 4px;
      transition: all .2s;
      cursor: pointer;
    }
    .btn-purple:hover { opacity: .85; }

    .card-dark {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    .form-control-dark {
      background: #0d1117;
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: .85rem;
      padding: .6rem .9rem;
      border-radius: 4px;
      width: 100%;
      transition: border-color .2s;
    }
    .form-control-dark:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(0,229,255,.1);
    }
    .label-text {
      font-size: .75rem;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: .4rem;
      display: block;
    }
    .badge-lang {
      font-family: 'JetBrains Mono', monospace;
      font-size: .65rem;
      padding: .2rem .5rem;
      border-radius: 3px;
      background: rgba(0,229,255,.1);
      color: var(--accent);
      border: 1px solid rgba(0,229,255,.2);
    }
    .online-dot {
      width: 8px; height: 8px;
      background: var(--accent3);
      border-radius: 50%;
      display: inline-block;
      box-shadow: 0 0 6px var(--accent3);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; }
      50% { opacity: .4; }
    }
    .alert-dark {
      background: rgba(239,68,68,.1);
      border: 1px solid rgba(239,68,68,.3);
      color: #fca5a5;
      border-radius: 4px;
      padding: .6rem .9rem;
      font-size: .85rem;
      font-family: 'JetBrains Mono', monospace;
    }
  </style>
  {% block extra_css %}{% endblock %}
</head>
<body>
<nav class="navbar-custom d-flex justify-content-between align-items-center">
  <a href="{{ url_for('index') }}" class="brand-logo">code<span>sync</span>.io</a>
  <div class="d-flex gap-2 align-items-center">
    {% if session.get('username') %}
      <span style="font-family:'JetBrains Mono',monospace;font-size:.8rem;color:var(--muted)">
        <i class="fa fa-user-circle me-1" style="color:var(--accent)"></i>{{ session.username }}
      </span>
      <a href="{{ url_for('dashboard') }}" class="btn-glow">Dashboard</a>
      <a href="{{ url_for('logout') }}" class="btn-glow" style="border-color:var(--danger);color:var(--danger)">Logout</a>
    {% else %}
      <a href="{{ url_for('login') }}" class="btn-glow">Login</a>
      <a href="{{ url_for('register') }}" class="btn-solid">Register</a>
    {% endif %}
  </div>
</nav>
{% block content %}{% endblock %}
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
