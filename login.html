{% extends "base.html" %}
{% block title %}Login — CodeSync{% endblock %}
{% block extra_css %}
<style>
  .auth-wrap {
    min-height: calc(100vh - 60px);
    display: flex; align-items: center; justify-content: center;
    padding: 2rem;
    background: radial-gradient(ellipse 60% 50% at 50% 0%, rgba(0,229,255,.07) 0%, transparent 70%);
  }
  .auth-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 2.5rem;
    width: 100%; max-width: 420px;
  }
  .auth-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: .4rem;
  }
  .auth-sub { font-size: .85rem; color: var(--muted); margin-bottom: 2rem; font-family: 'JetBrains Mono', monospace; }
  .form-group { margin-bottom: 1.2rem; }
  .btn-submit {
    width: 100%;
    padding: .75rem;
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: .9rem;
    cursor: pointer;
    transition: all .2s;
    margin-top: .5rem;
  }
  .btn-submit:hover { opacity: .85; box-shadow: var(--glow); }
  .auth-link { text-align: center; margin-top: 1.5rem; font-family: 'JetBrains Mono', monospace; font-size: .8rem; color: var(--muted); }
  .auth-link a { color: var(--accent); text-decoration: none; }
</style>
{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-box">
    <div class="auth-title">$ login</div>
    <div class="auth-sub">// Enter your credentials</div>
    {% if error %}<div class="alert-dark mb-3">⚠ {{ error }}</div>{% endif %}
    <form method="POST">
      <div class="form-group">
        <label class="label-text">username</label>
        <input type="text" name="username" class="form-control-dark" placeholder="your_username" required/>
      </div>
      <div class="form-group">
        <label class="label-text">password</label>
        <input type="password" name="password" class="form-control-dark" placeholder="••••••••" required/>
      </div>
      <button type="submit" class="btn-submit">Login →</button>
    </form>
    <div class="auth-link">Don't have an account? <a href="{{ url_for('register') }}">Register here</a></div>
  </div>
</div>
{% endblock %}
